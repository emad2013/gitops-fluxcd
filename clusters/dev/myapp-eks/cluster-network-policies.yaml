apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-network-policies
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/configs/cluster-network-policies
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: namespaces
  timeout: 5m
  
