apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: logging
spec:
  interval: 30m
  releaseName: grafana
  dependsOn:
    - name: loki
  chart:
    spec:
      chart: grafana
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 1h
  values:
    adminUser: admin
    adminPassword: changeme123

    service:
      type: ClusterIP
      port: 80

    persistence:
      enabled: true
      size: 10Gi

    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Loki
            type: loki
            access: proxy
            url: http://loki-gateway.logging.svc.cluster.local
            isDefault: true
            editable: false