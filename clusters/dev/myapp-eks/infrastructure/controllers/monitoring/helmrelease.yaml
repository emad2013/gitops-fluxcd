apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=55.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
      interval: 1h
  values:
    grafana:
      enabled: true
      adminPassword: "changeme123"
      service:
        type: ClusterIP
    prometheus:
      prometheusSpec:
        retention: 7d
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
    nodeExporter:
      enabled: true
    kubeStateMetrics:
      enabled: true
