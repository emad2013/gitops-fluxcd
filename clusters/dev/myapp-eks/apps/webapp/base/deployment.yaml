apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: webapp
  labels:
    app: webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
  # ── Automated rollback strategy ───────────────────────────────
  # Kubernetes will automatically rollback if new pods fail health checks
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # spin up 1 new pod before killing old ones
      maxUnavailable: 0  # keep all current pods running during update
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: webapp
          # ── Image policy marker ───────────────────────────────
          # Flux image-reflector reads this comment to know which
          # policy to use when auto-updating the image tag
          image: nginx:1.25.3 # {"$imagepolicy": "flux-system:webapp"}
          ports:
            - containerPort: 80
          # ── Liveness probe — restarts pod if it fails ─────────
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          # ── Readiness probe — removes pod from service if fail ─
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
